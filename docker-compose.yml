services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    volumes:
      - property_saas_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
  app:
    build: .
    restart: on-failure
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 - <<'PY'
import urllib.request
urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)
PY"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - property_saas_customer_files:/var/lib/property-saas/tenants
      - property_saas_system_files:/var/lib/property-saas/system
      - property_saas_backups:/var/backups/property-saas
      - property_saas_logs:/var/log/property-saas
volumes:
  property_saas_postgres:
  property_saas_customer_files:
  property_saas_system_files:
  property_saas_backups:
  property_saas_logs:
