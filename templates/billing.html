<div class="alert alert-info d-flex align-items-center gap-2"><i class="bi bi-info-circle"></i><div>选择房间自动计算，金额可编辑。日期区间内按月数累计，提交前请核对右侧收银明细。{MODE_NOTE}</div></div>
<script>window.ELEVATOR_TIERS={ELEVATOR_DATA};window.OWNER_ROOMS={OWNER_DATA};</script>
<form method=POST action="/billing/calc" id="billingForm">
<div class="row g-4">
<div class="col-lg-4">
<div class="card h-100 cashier-panel"><div class="card-header"><i class="bi bi-door-open"></i> 选择收费对象</div>
<div class="card-body">
<div class="mb-3"><label class="form-label">房间</label>
<input type="text" class="form-control form-control-sm mb-2" id="roomSearch" placeholder="输入楼栋/房号/业主搜索..." oninput="filterRooms()">
<select class="form-select" id="billingRoom" name="room_id" size="8" onchange="calcFees();showOwnerRooms();document.getElementById('roomSearch').value=this.options[this.selectedIndex].text">{OPTS}</select>
<small class="text-muted">支持楼栋、房号和业主名检索。{MODE_NOTE}</small>
</div>
<script>
window.filterRooms=function(){
    var q=document.getElementById('roomSearch').value.toLowerCase();
    var sel=document.getElementById('billingRoom');
    for(var i=0;i<sel.options.length;i++){
        var t=sel.options[i].text.toLowerCase();
        sel.options[i].style.display=t.indexOf(q)>-1?'':'none';
    }
};
</script>
<div class="mb-3"><label class="form-label">出账日期区间</label>
<div class="row g-2">
<div class="col-6">
<label class="small text-muted">起始日期</label>
<input type="date" name="period_start" class="form-control" id="periodStart" value="{PERIOD_START}" onchange="calcFees()">
</div>
<div class="col-6">
<label class="small text-muted">截止日期</label>
<input type="date" name="period_end" class="form-control" id="periodEnd" value="{PERIOD_END}" onchange="calcFees()">
</div>
</div>
<small class="text-muted" id="monthCount">共 3 个月</small>
</div>
<div id="ownerRoomsSection" class="mb-3" style="display:none">
<hr><label class="form-label text-primary"><i class="bi bi-building-add"></i> 同业主其他房间</label>
<div id="ownerRoomList" class="d-flex flex-wrap gap-2"></div>
</div>
<button type="submit" class="btn btn-primary btn-lg w-100"><i class="bi bi-file-earmark-plus"></i> 生成选中账单</button>
</div></div>
</div>
<div class="col-lg-8">
<div class="card h-100 cashier-panel">
<div class="card-header d-flex justify-content-between align-items-center">
<span><i class="bi bi-list-check"></i> 应收费用核对单</span>
<strong id="totalAmt" class="cashier-total">¥0.00</strong>
</div>
<div class="table-responsive"><table class="table table-hover align-middle">
<thead><tr><th style="width:42px"><input type="checkbox" checked id="checkAll"></th><th>费用项目</th><th>说明</th><th>计算明细</th><th class="text-end">金额</th></tr></thead>
<tbody>{FEE_HTML}</tbody></table></div>
</div>
</div>
</div>
</form>
<script src="/static/billing.js"></script>
