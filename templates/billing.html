<div class="alert alert-info d-flex align-items-center gap-2"><i class="bi bi-info-circle"></i><div>选择房间自动计算，金额可编辑。日期区间内按月数累计，提交前请核对右侧收银明细。{MODE_NOTE}</div></div>
<script>window.ELEVATOR_TIERS={ELEVATOR_DATA};window.OWNER_ROOMS={OWNER_DATA};window.BILLING_MODE="{BILLING_MODE}";window.METER_READINGS={METER_DATA};window.METER_DETAILS={METER_DETAIL_DATA};</script>
<form method=POST action="/billing/calc" id="billingForm">
<div class="row g-4 cashier-layout">
<div class="col-lg-4">
<div class="card h-100 cashier-panel cashier-object-card"><div class="card-header"><i class="bi bi-door-open"></i> 选择收费对象</div>
<div class="card-body">
<div class="mb-3"><label class="form-label">房间</label>
<input type="text" class="form-control form-control-sm mb-2" id="roomSearch" placeholder="输入楼栋/房号/业主搜索..." oninput="filterRooms()">
<select class="form-select searchable-select" id="billingRoom" name="room_id" size="8" data-search-input="roomSearch" onchange="calcFees();showOwnerRooms();document.getElementById('roomSearch').value=this.options[this.selectedIndex].text">{OPTS}</select>
<small class="text-muted">支持楼栋、房号和业主名检索。{MODE_NOTE}</small>
</div>
<script>
window.filterRooms=function(){ window.filterSearchableSelect && window.filterSearchableSelect('billingRoom','roomSearch'); };
</script>
<div class="mb-3"><label class="form-label">出账日期区间</label>
<div class="row g-2">
<div class="col-6">
<label class="small text-muted">起始日期</label>
<input type="date" name="period_start" class="form-control" id="periodStart" value="{PERIOD_START}" onchange="calcFees()">
</div>
<div class="col-6">
<label class="small text-muted">截止日期</label>
<input type="date" name="period_end" class="form-control" id="periodEnd" value="{PERIOD_END}" onchange="calcFees()">
</div>
</div>
<small class="text-muted" id="monthCount">共 3 个月</small>
<small class="text-muted d-block">起始日和截止日均计入服务期。</small>
</div>
<div id="ownerRoomsSection" class="mb-3" style="display:none">
<hr><div class="tenant-room-tools">
<label class="form-label text-primary mb-0"><i class="bi bi-building-add"></i> 同租户其他房间 <span id="ownerRoomCount" class="text-muted small"></span></label>
<div class="btn-group btn-group-sm"><button type="button" class="btn btn-outline-primary" id="ownerRoomsToggle">收起</button><button type="button" class="btn btn-outline-secondary" id="ownerRoomsSelectAll">全选</button><button type="button" class="btn btn-outline-secondary" id="ownerRoomsClear">取消全选</button></div>
</div>
<div id="ownerRoomList" class="tenant-room-list"></div>
</div>
<button type="submit" class="btn btn-primary btn-lg w-100"><i class="bi bi-file-earmark-plus"></i> 生成选中账单</button>
</div></div>
</div>
<div class="col-lg-8">
<div class="card h-100 cashier-panel cashier-fee-card">
<div class="card-header d-flex justify-content-between align-items-center">
<span><i class="bi bi-list-check"></i> 应收费用核对单</span>
<strong id="totalAmt" class="cashier-total">¥0.00</strong>
</div>
<div class="table-responsive"><table class="table table-hover align-middle">
<thead><tr><th style="width:42px"><input type="checkbox" checked id="checkAll"></th><th>费用项目</th><th>说明</th><th>计算明细</th><th class="text-end">金额</th></tr></thead>
<tbody>{FEE_HTML}</tbody></table></div>
</div>
</div>
</div>
</form>
<script src="/static/searchable_select.js?v=20260615"></script>
<script src="/static/billing.js?v=20260614spacewater"></script>
<script src="/static/billing_ui_extras.js?v=20260614billingui"></script>
