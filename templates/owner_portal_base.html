<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{TITLE} - 物业业主端</title>
<style>
:root{--ink:#17211b;--muted:#6a756f;--paper:#f7f2e8;--card:#fffaf0;--green:#1f6b4a;--gold:#d79b38;--line:#eadfc8}*{box-sizing:border-box}body{margin:0;font-family:"Songti SC","Noto Serif SC",serif;background:radial-gradient(circle at top left,#fff6d8,transparent 36%),linear-gradient(160deg,#f8f1e3,#e8f0e9);color:var(--ink)}.shell{max-width:760px;margin:0 auto;min-height:100vh;padding:22px 16px 80px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.brand{font-weight:800;letter-spacing:.08em;color:var(--green)}.nav a{color:var(--muted);text-decoration:none;margin-left:12px;font-size:14px}.hero-card,.detail-card,.pay-panel,.list-card,.metric{background:rgba(255,250,240,.88);border:1px solid var(--line);border-radius:24px;padding:20px;box-shadow:0 18px 45px rgba(45,38,21,.08);backdrop-filter:blur(12px)}.hero-card h1{font-size:30px;margin:6px 0}.eyebrow{color:var(--gold);font-weight:800;letter-spacing:.16em;font-size:12px}.metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:16px 0}.metric{text-decoration:none;color:var(--ink);display:block}.metric span{display:block;color:var(--muted);font-size:13px}.metric strong{font-size:28px}.action-row{display:flex;gap:12px;margin-top:18px}.btn-main,.btn-ghost{border:0;border-radius:999px;padding:12px 18px;text-decoration:none;display:inline-block}.btn-main{background:var(--green);color:white}.btn-ghost{border:1px solid var(--line);color:var(--green);background:white}.list-card{display:block;margin:12px 0;text-decoration:none;color:var(--ink)}.list-card span{display:block;color:var(--muted);margin-top:6px}input{width:100%;padding:14px 16px;border-radius:16px;border:1px solid var(--line);margin:8px 0 14px;background:white;font-size:16px}.inline-form-row{display:flex;gap:10px;align-items:flex-start}.inline-form-row input{flex:1}.inline-form-row .btn-ghost{margin-top:8px;white-space:nowrap}label{font-weight:700}.login-card{margin-top:12vh}.alert{padding:12px 14px;border-radius:16px;background:#ffe7e1;color:#9d2c16}dl{display:grid;grid-template-columns:90px 1fr;gap:10px}dt{color:var(--muted)}dd{margin:0;font-weight:700}@media(max-width:560px){.metric-grid{grid-template-columns:1fr}.action-row,.inline-form-row{flex-direction:column}.inline-form-row .btn-ghost{margin-top:0}.hero-card h1{font-size:25px}}
</style>
</head>
<body><main class="shell"><header class="top"><div class="brand">金沙物业业主端</div><nav class="nav"><a href="/owner-portal/dashboard">首页</a><a href="/owner-portal/bills">账单</a><a href="/owner-portal/payments">记录</a><a href="/owner-portal/logout">退出</a></nav></header>{CONTENT}</main></body>
</html>
