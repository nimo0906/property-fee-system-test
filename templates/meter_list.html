<div class="d-flex flex-wrap justify-content-between mb-3 gap-2"><form class="row g-2" method=GET>
<div class="col-auto"><label class="form-label small text-muted mb-1">账期</label><input type="date" name="period" class="form-control form-control-sm" value="{PERIOD}" onchange="this.form.submit()" placeholder="全部账期"><small class="text-muted">默认全部</small></div>
<div class="col-auto"><label class="form-label small text-muted mb-1">楼栋</label><select name="building" class="form-select form-select-sm" onchange="this.form.submit()">{BUILDING_OPTIONS}</select></div>
<div class="col-auto"><label class="form-label small text-muted mb-1">单元/区域</label><select name="unit" class="form-select form-select-sm" onchange="this.form.submit()">{UNIT_OPTIONS}</select></div>
<div class="col-auto"><label class="form-label small text-muted mb-1">费用类型</label><select name="fee_type_id" class="form-select form-select-sm" onchange="this.form.submit()">{FEE_OPTIONS}</select></div>
<div class="col-auto"><label class="form-label small text-muted mb-1">状态</label><select name="status" class="form-select form-select-sm" onchange="this.form.submit()"><option value="">全部状态</option><option value="draft"{DRAFT_SEL}>草稿</option><option value="confirmed"{CONFIRMED_SEL}>已确认</option></select></div>
<div class="col-auto"><label class="form-label small text-muted mb-1">关键字</label><input name="keyword" class="form-control form-control-sm" value="{KEYWORD}" placeholder="房号/租户/项目"></div>
<div class="col-auto align-self-end"><button class="btn btn-sm btn-outline-primary"><i class="bi bi-search"></i> 筛选</button><a href="/meter_readings" class="btn btn-sm btn-outline-secondary"><i class="bi bi-x-circle"></i></a></div></form>
<a href="/meter_readings/create" class="btn btn-primary btn-sm align-self-end"><i class="bi bi-plus-lg"></i> 录入抄表</a></div>
<div class="table-responsive"><table class="table table-hover align-middle"><thead><tr><th>房间</th><th>类型</th><th>账期</th><th class="text-end">上次</th><th class="text-end">本次</th><th class="text-end">用量</th><th>状态</th><th>日期</th><th style="width:100px">操作</th></tr></thead>
<tbody>{ROWS}</tbody></table></div>
