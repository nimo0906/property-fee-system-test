<div class="page-intro">
  <div><h2 class="mb-1">账单管理</h2></div>
  <div class="export-actions"><a class="btn btn-outline-secondary btn-sm" href="/bills/review?period_start={PERIOD_START}&period_end={PERIOD_END}"><i class="bi bi-clipboard-check"></i> 核对工作台</a></div>
</div>
<div class="filter-bar ledger-toolbar">
<div class="d-flex flex-wrap justify-content-between align-items-end gap-3">
<form class="row g-2 align-items-end flex-grow-1" method=GET>
{COMPANY_SCOPE_FIELD}
<div class="col-auto"><label class="form-label small text-muted mb-1">起始日期</label><input type="date" name="period_start" class="form-control form-control-sm" value="{PERIOD_START}" onchange="this.form.submit()"></div>
<div class="col-auto"><label class="form-label small text-muted mb-1">截止日期</label><input type="date" name="period_end" class="form-control form-control-sm" value="{PERIOD_END}" onchange="this.form.submit()"></div>
<div class="col-auto"><label class="form-label small text-muted mb-1">状态</label><select name="status" class="form-select form-select-sm" onchange="this.form.submit()"><option value="">全部状态</option><option value="unpaid"{SUN}>未缴</option><option value="paid"{SPA}>已缴</option><option value="overdue"{SOV}>逾期</option></select></div>
<div class="col-auto"><label class="form-label small text-muted mb-1">楼栋</label><select name="building" class="form-select form-select-sm" onchange="this.form.submit()">{BLD_OPTS}</select></div>
<div class="col-auto"><label class="form-label small text-muted mb-1">关键字</label><input name="keyword" class="form-control form-control-sm" placeholder="房号/业主" value="{KW}" style="width:140px"></div>
<div class="col-auto"><button class="btn btn-sm btn-outline-primary"><i class="bi bi-search"></i> 筛选</button>
<a href="/bills" class="btn btn-sm btn-outline-secondary"><i class="bi bi-x-circle"></i></a></div>
</form>
<a href="/bills/generate" class="btn btn-primary btn-sm"><i class="bi bi-file-earmark-plus"></i> 生成账单</a>
</div>
</div>
<div class="metric-grid ledger-summary-strip">
<div class="metric-card primary"><div class="metric-label">房间 / 账单</div><div class="metric-value">{ROOMS}户 / {COUNT}笔</div></div>
<div class="metric-card"><div class="metric-label">应收</div><div class="metric-value money">¥{TOTAL_AMT}</div></div>
<div class="metric-card success"><div class="metric-label">已收</div><div class="metric-value money money-paid">¥{TOTAL_PAID}</div></div>
<div class="metric-card danger"><div class="metric-label">未缴</div><div class="metric-value money money-due">{UNPAID_CNT}笔</div></div>
</div>
<form method=POST id="billActionForm"></form>
{BTN_TOP}
<div class="card billing-ledger">
<div class="card-header billing-ledger-header">
<div class="ledger-title-wrap">
<span class="ledger-title"><i class="bi bi-receipt"></i> 账单明细</span>
<small class="text-muted">共 {TOTAL_ROWS} 条，第 {PAGE} / {TOTAL_PAGES} 页；按租户和房间折叠展示</small>
</div>
<div class="ledger-scope-area ledger-scope-area-compact">
<div class="ledger-scope-tabs" data-testid="bill-scope-summary" aria-label="账单收费公司切换"><span class="visually-hidden">收费公司分区</span>{BILL_SCOPE_SUMMARY}</div>
</div>
</div>
<div class="table-responsive"><table class="table table-hover align-middle">
<thead><tr><th style="width:34px"><input type=checkbox id=selAll></th><th>编号</th><th>收费公司</th><th>房间</th><th>类型</th><th>账期</th><th class="text-end">金额</th><th class="text-end">已缴</th><th class="text-end">欠费</th><th>状态</th><th style="width:130px">操作</th></tr></thead>
<tbody>{ROWS}</tbody></table></div>
</div>
{PAGE_LINKS}
{BTN_BOTTOM}
<script>
function setGroupChecks(selector, checked){
    document.querySelectorAll(selector).forEach(function(c){ c.checked = checked; });
}
function toggleBillGroup(kind, group, checked){
    if(kind === 'owner'){
        setGroupChecks('.bill-chk[data-owner-group="' + group + '"]', checked);
        setGroupChecks('.room-group-chk[data-owner-group="' + group + '"]', checked);
    }else if(kind === 'room'){
        setGroupChecks('.bill-chk[data-room-group="' + group + '"]', checked);
    }
}
function toggleBillRoom(roomGroup){
    var rows = document.querySelectorAll('.bill-detail-' + roomGroup);
    var icon = document.getElementById('icon_' + roomGroup);
    rows.forEach(function(r){ r.style.display = r.style.display === 'none' ? '' : 'none'; });
    if(icon){ icon.className = icon.className === 'bi bi-chevron-right' ? 'bi bi-chevron-down' : 'bi bi-chevron-right'; }
    saveBillOpenState();
}
function billStateKey(){
    return 'pm:bills:open:' + location.pathname + location.search.replace(/[?&]_r=[^&]*/g, '').replace(/^&/, '?');
}
function openBillOwnerGroup(ownerGroup){
    document.querySelectorAll('.room-detail-' + ownerGroup).forEach(function(r){ r.style.display = ''; });
    var icon = document.getElementById('icon_' + ownerGroup);
    if(icon){ icon.className = 'bi bi-chevron-down'; }
}
function openBillRoomGroup(roomGroup){
    openBillOwnerGroup(roomGroup.split('r')[0]);
    document.querySelectorAll('.bill-detail-' + roomGroup).forEach(function(r){ r.style.display = ''; });
    var icon = document.getElementById('icon_' + roomGroup);
    if(icon){ icon.className = 'bi bi-chevron-down'; }
}
function saveBillOpenState(){
    var openGroups = [];
    document.querySelectorAll('.bill-room-row').forEach(function(row){
        var ownerCls = Array.from(row.classList).find(function(c){ return c.indexOf('room-detail-') === 0; });
        var onclickText = row.getAttribute('onclick') || '';
        var match = onclickText.match(/toggleBillRoom\('([^']+)'\)/);
        if(match && row.style.display !== 'none'){
            var roomGroup = match[1];
            var billRow = document.querySelector('.bill-detail-' + roomGroup);
            openGroups.push(billRow && billRow.style.display !== 'none' ? roomGroup : ownerCls.replace('room-detail-', ''));
        }
    });
    sessionStorage.setItem(billStateKey(), JSON.stringify(Array.from(new Set(openGroups))));
}
function restoreBillOpenState(){
    try{
        JSON.parse(sessionStorage.getItem(billStateKey()) || '[]').forEach(function(group){
            if(group.indexOf('r') > -1){ openBillRoomGroup(group); }
            else { openBillOwnerGroup(group); }
        });
    }catch(e){}
}
function rememberBillsBeforeLeave(){ saveBillOpenState(); }
document.addEventListener('DOMContentLoaded', restoreBillOpenState);
document.addEventListener('click', function(e){
    if(e.target.closest('.bill-row-action')){ rememberBillsBeforeLeave(); }
}, true);
document.getElementById('selAll')?.addEventListener('change', function(){
    document.querySelectorAll('.bill-chk,.owner-group-chk,.room-group-chk').forEach(function(c){ c.checked = this.checked; }, this);
});
function appendCsrfToken(form){
    var meta = document.querySelector('meta[name="csrf-token"]');
    if(!meta || !meta.content){
        return;
    }
    var input = document.createElement('input');
    input.type = 'hidden';
    input.name = '_csrf_token';
    input.value = meta.content;
    form.appendChild(input);
}
function submitBillAction(action, target){
    var ids = Array.from(document.querySelectorAll('.bill-chk:checked')).map(function(c){ return c.value; });
    if(ids.length === 0){
        alert('请先勾选账单');
        return;
    }
    var source = document.getElementById('billActionForm');
    var form = document.createElement('form');
    form.method = 'POST';
    form.action = action;
    form.target = target || '_self';
    ids.forEach(function(id){
        var input = document.createElement('input');
        input.type = 'hidden';
        input.name = 'bill_ids';
        input.value = id;
        form.appendChild(input);
    });
    var back = source ? source.querySelector('input[name="back"]') : null;
    if(back){
        var backInput = document.createElement('input');
        backInput.type = 'hidden';
        backInput.name = 'back';
        backInput.value = back.value;
        form.appendChild(backInput);
    }
    appendCsrfToken(form);
    document.body.appendChild(form);
    form.submit();
    form.remove();
}
</script>
