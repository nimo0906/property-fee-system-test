<div class="page-intro">
<div>
<h2 class="mb-1">业主管理</h2>
</div>
<div class="export-actions">
<a href="/rooms" class="btn btn-outline-secondary btn-sm"><i class="bi bi-door-open"></i> 房间管理</a>
<a href="/owners/create" class="btn btn-primary btn-sm"><i class="bi bi-plus-lg"></i> 添加业主</a>
</div>
</div>
<div class="row g-2 mb-3">
<div class="col-md-3 col-6"><div class="summary-tile primary"><div class="label">业主总数</div><strong>{TOTAL_OWNERS}</strong></div></div>
<div class="col-md-3 col-6"><div class="summary-tile success"><div class="label">已关联业主</div><strong>{LINKED_OWNERS}</strong></div></div>
<div class="col-md-3 col-6"><div class="summary-tile"><div class="label">关联房间</div><strong>{ROOM_COUNT}</strong></div></div>
<div class="col-md-3 col-6"><div class="summary-tile warning"><div class="label">未关联业主</div><strong>{EMPTY_OWNERS}</strong></div></div>
</div>
<div class="card mb-3">
<div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
<span><i class="bi bi-funnel"></i> 业主筛选</span>
</div>
<div class="card-body py-2">
<form class="owner-search-inline" method=GET>
<input name="keyword" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" class="form-control form-control-sm owner-search-input" placeholder="搜索姓名/电话..." value="{KEYWORD}">
<button class="btn btn-sm btn-outline-primary owner-search-btn"><i class="bi bi-search"></i></button>
<a href="/owners" class="btn btn-sm btn-outline-secondary owner-search-btn"><i class="bi bi-x-circle"></i></a>
</form>
</div>
</div>
<div class="card">
<div class="card-header d-flex justify-content-between align-items-center">
<span><i class="bi bi-people"></i> 业主档案</span>
</div>
<div class="table-responsive"><table class="table table-hover align-middle">
<thead><tr><th>姓名</th><th>电话</th><th>身份证</th><th>房间</th><th>类型</th><th class="text-end">面积</th><th>合同</th><th style="width:112px">操作</th></tr></thead>
<tbody>{ROWS}</tbody></table></div>
</div>
{PAGE_LINKS}
<script>function toggleOwnerRooms(oid){var rows=document.querySelectorAll(".owner-room-"+oid);var icon=document.getElementById("oicon_"+oid);rows.forEach(function(r){r.style.display=r.style.display==="none"?"":"none";});if(icon){icon.className=icon.className==="bi bi-chevron-right"?"bi bi-chevron-down":"bi bi-chevron-right";}}</script>
