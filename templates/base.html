<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{TITLE} - 物业管理收费系统</title>
<link href="/static/vendor/bootstrap/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/static/vendor/bootstrap-icons/bootstrap-icons.min.css">
<link rel="stylesheet" href="/static/app.css?v=20260603ui1">
</head>
<body>
<div class="app-shell">
<aside class="sidebar">
<div class="sidebar-brand">
<div class="d-flex align-items-center gap-3">
<div class="brand-mark"><img src="/static/brand-emblem.png" alt="金沙国际"></div>
<div>
<div class="brand-title">物业收费系统</div>
<div class="brand-subtitle">财务控制台 v2.0</div>
</div>
</div>
</div>
<nav class="sidebar-nav">{NAV}</nav>
{USER_HTML}
</aside>

<div class="offcanvas offcanvas-start mobile-nav" tabindex="-1" id="mobileNav">
<div class="offcanvas-header">
<h5 class="offcanvas-title"><img src="/static/brand-emblem.png" alt="金沙国际" class="mobile-brand-emblem"> 物业收费系统</h5>
<button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
</div>
<div class="offcanvas-body p-0">
<nav class="sidebar-nav">{NAV}</nav>
<a class="mobile-logout-btn" href="/logout"><i class="bi bi-box-arrow-right"></i> 退出登录</a>
</div>
</div>

<main class="main-content">
<div class="topbar d-flex align-items-center justify-content-between gap-3">
<div class="d-flex align-items-center gap-3 min-w-0">
<button class="btn mobile-menu-btn d-lg-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileNav" aria-label="打开菜单">
<i class="bi bi-list"></i><span>菜单</span>
</button>
<div class="page-icon"><i class="bi {ICON}"></i></div>
<div>
<div class="page-kicker">PROPERTY FINANCE</div>
<h1 class="page-title">{TITLE}</h1>
</div>
</div>
<div class="topbar-actions d-flex align-items-center gap-2">{TOP_ACTIONS}</div>
</div>
{FLASH}
<div class="content-stack">{CONTENT}</div>
<footer><i class="bi bi-shield-check"></i> 物业管理收费系统 v2.0 · 本地财务控制台</footer>
</main>
</div>
<script src="/static/vendor/bootstrap/bootstrap.bundle.min.js"></script>
<script>
function toggleRoom(rid){
    var rows=document.querySelectorAll(".room-detail-"+rid);
    var icon=document.getElementById("icon_"+rid);
    rows.forEach(function(r){r.style.display=r.style.display==="none"?"":"none";});
    if(icon){icon.className=icon.className==="bi bi-chevron-right"?"bi bi-chevron-down":"bi bi-chevron-right";}
}
</script>
</body>
</html>
