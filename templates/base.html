<script>
function toggleRoom(rid){
    var rows=document.querySelectorAll(".room-detail-"+rid);
    var icon=document.getElementById("icon_"+rid);
    rows.forEach(function(r){r.style.display=r.style.display==="none"?"":"none";});
    if(icon){icon.className=icon.className==="bi bi-chevron-right"?"bi bi-chevron-down":"bi bi-chevron-right";}
}
</script>
<script>
(function(){
    var tip;
    function ensureTip(){
        if(!tip){
            tip=document.createElement('div');
            tip.className='sidebar-float-tip';
            document.body.appendChild(tip);
        }
        return tip;
    }
    function labelFor(el){
        var span=el.querySelector('span');
        return span ? span.textContent.trim() : (el.getAttribute('title') || '').trim();
    }
    function showTip(el){
        var text=labelFor(el);
        if(!text){ return; }
        var box=el.getBoundingClientRect();
        var node=ensureTip();
        node.textContent=text;
        node.style.left=(box.right + 10) + 'px';
        node.style.top=(box.top + box.height / 2) + 'px';
        node.classList.add('show');
    }
    function hideTip(){
        if(tip){ tip.classList.remove('show'); }
    }
    document.addEventListener('mouseover', function(e){
        var el=e.target.closest && e.target.closest('.sidebar .nav-link, .sidebar .system-tool-btn');
        if(el){ showTip(el); }
    });
    document.addEventListener('mouseout', function(e){
        var el=e.target.closest && e.target.closest('.sidebar .nav-link, .sidebar .system-tool-btn');
        if(el){ hideTip(); }
    });
    document.addEventListener('scroll', hideTip, true);
})();
</script>

</body>
