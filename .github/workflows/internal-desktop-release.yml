name: Internal desktop release

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build Windows release package
        shell: cmd
        run: package_windows_release.bat
      - uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: release/windows/物业管理收费系统-v2.0-windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build macOS app
        shell: bash
        run: ./build_macos_app.command
      - name: Package macOS release
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_DIR='release/macos/物业管理收费系统-v2.0-macos'
          APP_NAME='物业管理收费系统.app'
          rm -rf "$RELEASE_DIR/$APP_NAME"
          cp -R "dist/$APP_NAME" "$RELEASE_DIR/$APP_NAME"
          rm -f release/macos/物业管理收费系统-v2.0-macos.zip
          (cd release/macos && ditto -c -k --sequesterRsrc --keepParent 物业管理收费系统-v2.0-macos 物业管理收费系统-v2.0-macos.zip)
          TMP_UNZIP=$(mktemp -d)
          ditto -x -k release/macos/物业管理收费系统-v2.0-macos.zip "$TMP_UNZIP"
          test -x "$TMP_UNZIP/物业管理收费系统-v2.0-macos/物业管理收费系统.app/Contents/MacOS/物业管理收费系统"
          test -L "$TMP_UNZIP/物业管理收费系统-v2.0-macos/物业管理收费系统.app/Contents/Frameworks/Python3"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: release/macos/物业管理收费系统-v2.0-macos.zip

  publish-internal-latest:
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Prepare assets and manifest
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          cp artifacts/windows-release/物业管理收费系统-v2.0-windows.zip release-assets/property-fee-system-v2.0-windows.zip
          cp artifacts/macos-release/物业管理收费系统-v2.0-macos.zip release-assets/property-fee-system-v2.0-macos.zip
          python3 - <<'PY'
          from pathlib import Path
          from urllib.parse import quote
          import hashlib, json, re
          app_version = Path('server/app_version.py').read_text(encoding='utf-8')
          version = re.search(r"APP_VERSION\s*=\s*'([^']+)'", app_version).group(1)
          base = 'https://github.com/nimo0906/property-fee-system-test/releases/download/internal-latest/'
          mac = Path('release-assets/property-fee-system-v2.0-macos.zip')
          win = Path('release-assets/property-fee-system-v2.0-windows.zip')
          manifest = {
              'version': version,
              'notes': '内测最新版：包含系统更新中心、数据导入、账单生成、支付订单、系统健康和权限相关修复。',
              'assets': {
                  'mac': {'url': base + quote(mac.name), 'sha256': hashlib.sha256(mac.read_bytes()).hexdigest()},
                  'windows': {'url': base + quote(win.name), 'sha256': hashlib.sha256(win.read_bytes()).hexdigest()},
              },
          }
          Path('release-assets/update_manifest.json').write_text(json.dumps(manifest, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          print(json.dumps(manifest, ensure_ascii=False, indent=2))
          PY
      - name: Publish GitHub Release internal-latest
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag -f internal-latest "$GITHUB_SHA"
          git push -f origin internal-latest
          if gh release view internal-latest >/dev/null 2>&1; then
            gh release upload internal-latest release-assets/* --clobber
          else
            gh release create internal-latest release-assets/* --title 'Internal latest desktop builds' --notes '自动生成的内测最新版 Mac/Windows 桌面包和更新清单。'
          fi
